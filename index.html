<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ripple</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #0f1328;
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo {
      font-size: 32px;
      letter-spacing: 10px;
      font-weight: bold;
      color: #ff2d87;
      margin-bottom: 10px;
    }

    .line {
      width: 60px;
      height: 4px;
      background: #ff2d87;
      border-radius: 10px;
      margin: 10px auto 30px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.3;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      padding: 16px;
      border-radius: 999px;
      background: #ff2d87;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 10px 25px rgba(255, 45, 135, 0.4);
    }

    /* 🔥 Make it scale better on bigger screens */
    @media (min-width: 768px) {
      .logo {
        font-size: 40px;
      }

      h1 {
        font-size: 40px;
      }

      .container {
        max-width: 500px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">RIPPLE</div>
    <div class="line"></div>

    <h1>Connect with people around you</h1>

    <a 
      class="btn" 
      href="https://apps.apple.com/us/app/ripple-connect/id6759999775"
    >
      Download on the App Store
    </a>
  </div>
</body>
</html>
